name: CI/CD - DASH_Bling

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app/

      - name: Verify app loads
        env:
          BLING_CLIENT_ID: test
          BLING_CLIENT_SECRET: test
          DASH_USERNAME: test
          DASH_PASSWORD: test
        run: |
          python -c "from app.main import app; print('App loaded successfully')"

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit

      - name: Audit dependencies
        run: pip-audit

      - name: Check for secrets in code
        run: |
          if grep -rn "BLING_CLIENT_ID=.\{20,\}" --include="*.py" --include="*.html" .; then
            echo "::error::Possible hardcoded secret found!"
            exit 1
          fi
          echo "No secrets found in source code."

  deploy:
    needs: [lint-and-test, security-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/public_html/dash
            git pull origin main || true
            source venv/bin/activate
            pip install -r requirements.txt -q
            echo "Deploy completed at $(date)"
